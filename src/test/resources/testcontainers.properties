# 推荐：项目根 .env 中配置 MYSQL_ROOT_PASSWORD 后，直接 ./gradlew integrationTest
# （任务会自动注入 DRAW_IT_* 并连接 127.0.0.1:12306/draw_it_integration）。
#
# 亦可手动 export（未设 DRAW_IT_JDBC_URL 且 .env 无密码时，才会走 Testcontainers 起库）：
#   export DRAW_IT_JDBC_URL='jdbc:mysql://127.0.0.1:12306/draw_it_integration?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true'
#   export DRAW_IT_DB_USER=root
#   export DRAW_IT_DB_PASSWORD='你的 MYSQL_ROOT_PASSWORD'
#   ./gradlew --no-daemon integrationTest
#
# 用户级配置仍见：https://java.testcontainers.org/features/configuration/
