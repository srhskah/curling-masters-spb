# MyBatis Generator Configuration Properties
# This file can be used to override default values in generatoConfig.xml

# Database connection settings
db.driver=com.mysql.cj.jdbc.Driver
db.url=${MYSQL_DB_URL}
db.username=${MYSQL_USER}
db.password=${MYSQL_ROOT_PASSWORD}

# Output directories
output.java.dir=src/main/java
output.resources.dir=src/main/resources

# Package names
package.entity=com.example.entity
package.mapper=com.example.mapper
package.service=com.example.service
package.controller=com.example.controller

# Table configurations (comma-separated)
tables=user,season,series,tournament,tournament_entry,match,set_score,user_tournament_points,notification,withdrawal_request
