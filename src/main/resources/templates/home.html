<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('首页')}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2770%25%27%20font-size%3D%2772%27%20text-anchor%3D%27middle%27%3E%F0%9F%A5%8C%3C/text%3E%3C/svg%3E">
    <link rel="shortcut icon"
          href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2770%25%27%20font-size%3D%2772%27%20text-anchor%3D%27middle%27%3E%F0%9F%A5%8C%3C/text%3E%3C/svg%3E">
</head>

<body th:classappend="${ipBgClass}">
    <!-- 导航栏 -->
    <div th:replace="~{fragments :: navbar}"></div>

    <!-- 消息提示 -->
    <div th:replace="~{fragments :: success-alert}"></div>
    <div th:replace="~{fragments :: error-alert}"></div>

    <div class="container mt-4">
        <div class="welcome-card"
             th:with="isAdmin=${#authorization.expression('hasRole(''ROLE_SUPER_ADMIN'') or hasRole(''ROLE_ADMIN'')')},
                      isLoggedIn=${#authorization.expression('isAuthenticated()') and !#authorization.expression('isAnonymous()')}">
            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold text-dark">欢迎光临</h1>
                <p th:if="${isLoggedIn}" class="lead text-muted">您已成功登录系统，开始管理您的冰壶赛事</p>
                <p th:if="${!isLoggedIn}" class="lead text-muted">欢迎使用 Curling Masters。您可以先浏览赛事信息，或登录后进行管理。</p>
            </div>

            <!-- 管理员功能区域 -->
            <div th:if="${isAdmin}" class="row mb-4">
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0"><i class="bi bi-gear"></i> 管理功能</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <div class="d-grid">
                                        <a href="/season/management" class="btn btn-outline-primary">
                                            <i class="bi bi-calendar3"></i> 赛季管理
                                        </a>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="d-grid">
                                        <a href="/tournamentLevel/list" class="btn btn-outline-primary">
                                            <i class="bi bi-layers"></i> 赛事等级管理
                                        </a>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="d-grid">
                                        <a href="/series/list" class="btn btn-outline-primary">
                                            <i class="bi bi-collection"></i> 赛事系列管理
                                        </a>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="d-grid">
                                        <a href="/tournament/list" class="btn btn-outline-primary">
                                            <i class="bi bi-trophy"></i> 赛事管理
                                        </a>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="d-grid">
                                        <a href="/match/list" class="btn btn-outline-primary">
                                            <i class="bi bi-controller"></i> 比赛管理
                                        </a>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="d-grid">
                                        <a href="/user/manage" class="btn btn-outline-primary">
                                            <i class="bi bi-people"></i> 用户管理
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 用户功能区域 -->
            <div th:if="${!isAdmin}" class="row mb-4">
                <div class="col-md-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-info text-white">
                            <h5 class="mb-0"><i class="bi bi-trophy"></i> 赛事功能</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <div class="d-grid">
                                        <a href="/tournament/list" class="btn btn-outline-info">
                                            <i class="bi bi-list"></i> 赛事列表
                                        </a>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="d-grid">
                                        <a href="/season/list" class="btn btn-outline-info">
                                            <i class="bi bi-calendar3"></i> 赛季列表
                                        </a>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="d-grid">
                                        <a href="/ranking" class="btn btn-outline-info">
                                            <i class="bi bi-list-ol"></i> 排名
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mt-3 mt-md-0">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                            <h5 class="mb-0"><i class="bi bi-list-ol"></i> 排名前24</h5>
                            <a class="btn btn-light btn-sm" href="/ranking">更多</a>
                        </div>
                        <div class="card-body">
                            <ul class="nav nav-pills mb-3" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#homeRankTotal" type="button" role="tab">
                                        总排名
                                    </button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" data-bs-toggle="pill" data-bs-target="#homeRankSeason" type="button" role="tab">
                                        当前赛季
                                    </button>
                                </li>
                            </ul>

                            <div class="tab-content">
                                <div class="tab-pane fade show active" id="homeRankTotal" role="tabpanel">
                                    <div class="table-responsive">
                                        <table class="table table-sm table-hover mb-0">
                                            <tbody>
                                            <tr th:each="entry, stat : ${totalRankingTop24}">
                                                <td style="width: 56px;">
                                                    <span class="badge bg-primary" th:text="${stat.index + 1}"></span>
                                                </td>
                                                <td th:text="${entry.username}"></td>
                                                <td style="width: 90px; text-align: right;">
                                                    <span class="badge bg-success" th:text="${entry.points}"></span>
                                                </td>
                                            </tr>
                                            <tr th:if="${#lists.isEmpty(totalRankingTop24)}">
                                                <td colspan="3" class="text-center text-muted">暂无数据</td>
                                            </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div class="tab-pane fade" id="homeRankSeason" role="tabpanel">
                                    <div class="text-muted small mb-2" th:if="${currentSeason != null}"
                                         th:text="${currentSeason.year + '年' + (currentSeason.half == 1 ? '上半年' : '下半年')}"></div>
                                    <div class="table-responsive">
                                        <table class="table table-sm table-hover mb-0">
                                            <tbody>
                                            <tr th:each="entry, stat : ${currentSeasonRankingTop24}">
                                                <td style="width: 56px;">
                                                    <span class="badge bg-primary" th:text="${stat.index + 1}"></span>
                                                </td>
                                                <td th:text="${entry.username}"></td>
                                                <td style="width: 90px; text-align: right;">
                                                    <span class="badge bg-success" th:text="${entry.points}"></span>
                                                </td>
                                            </tr>
                                            <tr th:if="${#lists.isEmpty(currentSeasonRankingTop24)}">
                                                <td colspan="3" class="text-center text-muted">暂无数据</td>
                                            </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 系统信息区域（仅管理员可见） -->
            <div class="row" th:if="${isAdmin}">
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-secondary text-white">
                            <h5 class="mb-0"><i class="bi bi-server"></i> 系统信息</h5>
                        </div>
                        <div class="card-body">
                            <div class="row text-center">
                                <div class="col-md-3 mb-3">
                                    <div class="p-3">
                                        <i class="bi bi-cpu fs-3 text-primary"></i>
                                        <h6 class="mt-2">Java环境</h6>
                                        <p class="mb-0 small text-muted" th:text="${systemInfo.javaVersion}">Java版本</p>
                                    </div>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <div class="p-3">
                                        <i class="bi bi-laptop fs-3 text-success"></i>
                                        <h6 class="mt-2">操作系统</h6>
                                        <p class="mb-0 small text-muted" th:text="${systemInfo.osName}">操作系统</p>
                                    </div>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <div class="p-3">
                                        <i class="bi bi-memory fs-3 text-warning"></i>
                                        <h6 class="mt-2">内存使用</h6>
                                        <div class="progress mb-2" style="height: 8px;">
                                            <div class="progress-bar" role="progressbar" 
                                                 th:style="'width: ' + ${systemInfo.memoryUsagePercent} + '%'"
                                                 th:aria-valuenow="${systemInfo.memoryUsagePercent}" aria-valuemin="0" aria-valuemax="100">
                                            </div>
                                        </div>
                                        <p class="mb-0 small text-muted" th:text="${systemInfo.memoryUsagePercent + '%'}">内存使用率</p>
                                    </div>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <div class="p-3">
                                        <i class="bi bi-clock fs-3 text-info"></i>
                                        <h6 class="mt-2">当前时间</h6>
                                        <p class="mb-0 small text-muted" th:text="${#temporals.format(currentTime, 'yyyy-MM-dd HH:mm:ss')}">当前时间</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div th:replace="~{fragments :: footer}"></div>

    <!-- 脚本 -->
    <th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
