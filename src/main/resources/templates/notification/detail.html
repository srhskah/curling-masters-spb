<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('通知详情')}"></head>
<body th:classappend="${ipBgClass}">
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: error-alert}"></div>
<div th:replace="~{fragments :: success-alert}"></div>
<div class="container mt-4" th:if="${message != null}">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0" th:text="${message.title}">通知标题</h3>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm" href="/notification/list">返回列表</a>
            <a class="btn btn-outline-primary btn-sm" th:href="@{/notification/export/pdf/{id}(id=${message.id})}">导出PDF</a>
            <form method="post" th:action="@{/notification/mark-unread/{id}(id=${message.id})}">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-warning btn-sm">标记未读</button>
            </form>
            <button type="button" class="btn btn-primary btn-sm"
                    data-copy-target="#copyText" data-copy-reset-ms="1200">复制为文本</button>
        </div>
    </div>
    <div class="text-muted small mb-3">
        <span th:text="${message.publishedAt != null ? #temporals.format(message.publishedAt,'yyyy-MM-dd HH:mm:ss') : '-'}">时间</span>
        <span th:if="${message.authorUsername != null}"> · 发起者：<span th:text="${message.authorUsername}">用户</span></span>
    </div>
    <article class="card border-0 shadow-sm">
        <div class="card-body markdown-body" th:utext="${message.contentHtml}"></div>
    </article>
    <div class="mt-3" th:if="${canEditThis}">
        <a class="btn btn-sm btn-warning" th:href="@{/notification/edit/{id}(id=${message.id})}">编辑</a>
    </div>
</div>
<textarea id="copyText" class="d-none" th:text="${copyText}"></textarea>
<div th:replace="~{fragments :: footer}"></div>
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
