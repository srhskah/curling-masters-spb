<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('比赛计分')}"></head>
<body th:classappend="${ipBgClass}">
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: success-alert}"></div>
<div th:replace="~{fragments :: error-alert}"></div>

<div class="container mt-4">
    <div class="row">
        <div class="col-lg-10 mx-auto">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="bi bi-controller"></i> 比赛信息</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>比赛ID：</strong><span th:text="${match.id}"></span></p>
                            <p><strong>选手1：</strong><span th:text="${player1 != null ? player1.username : '待定'}"></span></p>
                            <p><strong>选手2：</strong><span th:text="${player2 != null ? player2.username : '待定'}"></span></p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>预定时间：</strong>
                                <span th:text="${match.scheduledTime != null ? #temporals.format(match.scheduledTime, 'yyyy-MM-dd HH:mm') : '未设置'}"></span>
                            </p>
                            <p><strong>状态：</strong>
                                <span th:if="${match.status == 0}" class="badge bg-secondary">未开始</span>
                                <span th:if="${match.status == 1}" class="badge bg-primary">进行中</span>
                                <span th:if="${match.status == 2}" class="badge bg-success">已结束</span>
                                <span th:if="${match.status == 3}" class="badge bg-danger">退赛</span>
                            </p>
                            <p><strong>总分：</strong><span th:text="${totalPlayer1 + ' : ' + totalPlayer2}"></span></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-pencil-square"></i> 录入比分</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/match/score/save/{matchId}(matchId=${match.id})}" method="post">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="seriesId" th:value="${seriesId}"/>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">先后手</label>
                                <select class="form-select" name="firstEndHammer">
                                    <option value="">不设置</option>
                                    <option value="1" th:selected="${match.firstEndHammer == 1}" th:text="${player1 != null ? player1.username : '选手1'}">player1</option>
                                    <option value="2" th:selected="${match.firstEndHammer == 2}" th:text="${player2 != null ? player2.username : '选手2'}">player2</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">局数</label>
                                <input type="number" class="form-control" id="setCountInput" min="1" max="20"
                                       th:value="${#lists.isEmpty(setScores) ? defaultSetCount : #lists.size(setScores)}"/>
                            </div>
                            <div class="col-md-4 d-flex align-items-end">
                                <button type="button" class="btn btn-outline-primary w-100" onclick="renderSetRows()">
                                    生成局数
                                </button>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-bordered align-middle">
                                <thead class="table-light">
                                <tr>
                                    <th>局</th>
                                    <th th:text="${player1 != null ? player1.username : '选手1'}">player1</th>
                                    <th th:text="${player2 != null ? player2.username : '选手2'}">player2</th>
                                </tr>
                                </thead>
                                <tbody id="setRowsBody">
                                <tr th:each="ss : ${setScores}">
                                    <td>
                                        <input type="number" class="form-control" name="setNumbers" min="1"
                                               th:value="${ss.setNumber}">
                                    </td>
                                    <td>
                                        <input type="number" class="form-control" name="player1Scores" min="0"
                                               th:value="${ss.player1Score}">
                                    </td>
                                    <td>
                                        <input type="number" class="form-control" name="player2Scores" min="0"
                                               th:value="${ss.player2Score}">
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between mt-3">
                            <a th:href="@{/tournament/detail/{id}(id=${match.tournamentId})}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> 返回赛事
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> 保存比分
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>
<th:block th:replace="~{fragments :: scripts}"></th:block>
<script>
    function renderSetRows() {
        const body = document.getElementById('setRowsBody');
        const n = Number(document.getElementById('setCountInput').value || 0);
        if (!body || !Number.isInteger(n) || n < 1) return;
        body.innerHTML = '';
        for (let i = 1; i <= n; i++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="number" class="form-control" name="setNumbers" min="1" value="${i}"></td>
                <td><input type="number" class="form-control" name="player1Scores" min="0" value="0"></td>
                <td><input type="number" class="form-control" name="player2Scores" min="0" value="0"></td>
            `;
            body.appendChild(tr);
        }
    }
    document.addEventListener('DOMContentLoaded', () => {
        const body = document.getElementById('setRowsBody');
        if (body && body.children.length === 0) renderSetRows();
    });
</script>
</body>
</html>
