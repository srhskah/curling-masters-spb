<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head(${pageTitle})}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        /* 移动端：表格改卡片，提升可读性与可点按 */
        @media (max-width: 767.98px) {
            .generic-table-desktop { display: none; }
            .generic-cards-mobile { display: block; }
            .generic-cards-grid > [class^="col-"] { display: flex; }
            .generic-cards-grid .card { width: 100%; }
            .generic-list-actions .btn,
            .generic-list-actions button.btn {
                padding: 0.5rem 0.75rem;
            }
            .generic-card-row {
                display: grid;
                grid-template-columns: 96px 1fr;
                gap: 0.25rem 0.75rem;
                align-items: start;
            }
            .generic-card-label {
                color: #6c757d;
                font-weight: 600;
                font-size: 0.85rem;
            }
        }
        @media (min-width: 768px) {
            .generic-table-desktop { display: block; }
            .generic-cards-mobile { display: none; }
        }
    </style>
</head>

<body th:classappend="${ipBgClass}">
    <!-- 导航栏 -->
    <div th:replace="~{fragments :: navbar}"></div>

    <!-- 消息提示 -->
    <div th:replace="~{fragments :: success-alert}"></div>
    <div th:replace="~{fragments :: error-alert}"></div>

    <div class="container mt-4">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i th:class="${pageIcon}"></i> <span th:text="${pageTitle}"></span>
                </h5>
                <a th:if="${isAdmin and addUrl != null}" th:href="${addUrl}" class="btn btn-light btn-sm">
                    <i class="bi bi-plus-circle"></i> 添加<span th:text="${entityName}"></span>
                </a>
            </div>
            <div class="card-body">
                <!-- 顶部筛选/搜索区域 -->
                <div class="row g-2 mb-3">
                    <!-- 左侧：原有筛选器（可选） -->
                    <div th:if="${filters != null and !#lists.isEmpty(filters)}" class="col-12 col-md-7">
                        <div class="row g-2">
                            <div th:each="filter : ${filters}" class="col-12 col-md-6 col-xl-4">
                                <div th:if="${filter['type'] == 'select'}">
                                    <select class="form-select" th:id="${filter['id']}" th:onchange="${filter['onchange']}">
                                        <option value="">所有<span th:text="${filter['label']}"></span></option>
                                        <option th:each="option : ${filter['options']}" 
                                                th:value="${option['value']}"
                                                th:text="${option['text']}">
                                        </option>
                                    </select>
                                </div>
                                <div th:if="${filter['type'] == 'text'}">
                                    <input type="text" class="form-control" th:id="${filter['id']}" 
                                           th:placeholder="${filter['placeholder']}" th:onkeyup="${filter['onkeyup']}">
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 右侧：通用模糊搜索（赛事等级/系列/赛事等列表共用） -->
                    <div class="col-12 col-md-5">
                        <input id="genericSearchInput"
                               type="search"
                               class="form-control"
                               placeholder="模糊搜索（名称、备注等）">
                    </div>
                </div>
                
                <!-- 空数据提示 -->
                <div th:if="${dataList == null or #lists.isEmpty(dataList)}" class="text-center py-4">
                    <i th:class="${emptyIcon}" class="fs-1 text-muted"></i>
                    <p class="mt-2 text-muted" th:text="${emptyMessage}"></p>
                    <a th:if="${isAdmin and addUrl != null}" th:href="${addUrl}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> 创建第一个<span th:text="${entityName}"></span>
                    </a>
                </div>
                
                <!-- 数据表格 -->
                <div th:if="${dataList != null and !#lists.isEmpty(dataList)}">
                    <!-- 移动端：仅卡片 -->
                    <div class="d-md-none mb-3">
                        <div class="generic-cards-mobile">
                            <div class="row g-3 generic-cards-grid">
                                <div class="col-12 col-sm-6" th:each="item : ${dataList}" th:with="itemData=${item.data}">
                                    <div class="card border-0 shadow-sm h-100"
                                         th:attr="data-filters=${item.filters + ' ' + #strings.arrayJoin(itemData, ' ')}">
                                        <div class="card-body">
                                            <div class="d-flex justify-content-end align-items-start mb-2">
                                                <span class="badge bg-light text-dark border" th:text="${'ID: ' + item.id}"></span>
                                            </div>

                                            <div class="generic-card-row">
                                                <div th:each="column, colStat : ${columns}"
                                                     th:with="cellValue=${itemData[colStat.index]}"
                                                     class="d-flex justify-content-between align-items-center mb-1">
                                                    <div class="generic-card-label me-2" th:text="${column['title']}"></div>
                                                    <div class="text-end flex-grow-1">
                                                        <div th:if="${column['type'] == 'custom'}"
                                                             th:utext="${column['content'] != null ? #strings.replace(
                                                                     column['content'],
                                                                     '{item}',
                                                                     cellValue != null ? cellValue.toString() : ''
                                                                 ) : (cellValue != null ? cellValue : '')}"></div>
                                                        <div th:if="${column['type'] == 'link'}">
                                                            <a th:href="${column['linkPrefix'] + cellValue}"
                                                               class="text-decoration-none"
                                                               th:text="${column['displayPrefix'] + cellValue + column['displaySuffix']}">
                                                            </a>
                                                        </div>
                                                        <div th:if="${column['type'] == 'badge'}">
                                                            <span th:if="${column['badgeClass'] != null}" th:class="${column['badgeClass']}" th:text="${cellValue}"></span>
                                                            <span th:if="${column['badgeClass'] == null}" class="badge bg-info" th:text="${cellValue}"></span>
                                                        </div>
                                                        <div th:if="${column['type'] == 'text' or column['type'] == null}" th:text="${cellValue}"></div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div th:if="${hasActions}" class="mt-3 d-flex flex-wrap gap-2 generic-list-actions">
                                                <th:block th:each="action : ${actions}">
                                                    <a th:if="${(action['method'] == null or action['method'] == 'get') and (isAdmin or action['public'] == true)}"
                                                       th:href="${action['urlPrefix'] + item.id}"
                                                       th:class="${action['btnClass']}"
                                                       th:attr="data-confirm=${action['confirm']}"
                                                       onclick="return !this.dataset.confirm || confirm(this.dataset.confirm)">
                                                        <i th:class="${action['icon']}"></i> <span th:text="${action['text']}"></span>
                                                    </a>
                                                    <form th:if="${action['method'] == 'post' and isAdmin}"
                                                          th:action="${action['urlPrefix'] + item.id}"
                                                          method="post"
                                                          style="display: inline;"
                                                          th:attr="data-confirm=${action['confirm']}"
                                                          onsubmit="return !this.dataset.confirm || confirm(this.dataset.confirm)">
                                                        <input type="hidden"
                                                               th:if="${_csrf != null}"
                                                               th:name="${_csrf.parameterName}"
                                                               th:value="${_csrf.token}" />
                                                        <button type="submit" th:class="${action['btnClass']}">
                                                            <i th:class="${action['icon']}"></i> <span th:text="${action['text']}"></span>
                                                        </button>
                                                    </form>
                                                </th:block>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 宽屏：仅表格 -->
                    <div class="d-none d-md-block generic-table-desktop">
                        <!-- 宽屏表格（可横向滚动） -->
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                    <tr>
                                        <th th:each="column : ${columns}" th:text="${column['title']}"></th>
                                        <th th:if="${hasActions}">操作</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="item : ${dataList}" 
                                    th:with="itemData=${item.data}"
                                    th:attr="data-filters=${item.filters + ' ' + #strings.arrayJoin(itemData, ' ')}">
                                        <td th:each="column, colStat : ${columns}"
                                            th:with="cellValue=${itemData[colStat.index]}">
                                            <div th:if="${column['type'] == 'custom'}"
                                                 th:utext="${column['content'] != null ? #strings.replace(
                                                     column['content'],
                                                     '{item}',
                                                     cellValue != null ? cellValue.toString() : ''
                                                 ) : (cellValue != null ? cellValue : '')}"></div>
                                            <div th:if="${column['type'] == 'link'}">
                                                <a th:href="${column['linkPrefix'] + cellValue}"
                                                   class="text-decoration-none"
                                                   th:text="${column['displayPrefix'] + cellValue + column['displaySuffix']}">
                                                </a>
                                            </div>
                                            <div th:if="${column['type'] == 'badge'}">
                                                <span th:if="${column['badgeClass'] != null}" th:class="${column['badgeClass']}" th:text="${cellValue}"></span>
                                                <span th:if="${column['badgeClass'] == null}" class="badge bg-info" th:text="${cellValue}"></span>
                                            </div>
                                            <div th:if="${column['type'] == 'text' or column['type'] == null}" th:text="${cellValue}"></div>
                                        </td>
                                        <td th:if="${hasActions}">
                                            <div class="btn-group generic-list-actions" role="group">
                                                <th:block th:each="action : ${actions}">
                                                    <a th:if="${(action['method'] == null or action['method'] == 'get') and (isAdmin or action['public'] == true)}"
                                                       th:href="${action['urlPrefix'] + item.id}"
                                                       th:class="${action['btnClass']}"
                                                       th:attr="data-confirm=${action['confirm']}"
                                                       onclick="return !this.dataset.confirm || confirm(this.dataset.confirm)">
                                                        <i th:class="${action['icon']}"></i> <span th:text="${action['text']}"></span>
                                                    </a>
                                                    <form th:if="${action['method'] == 'post' and isAdmin}"
                                                          th:action="${action['urlPrefix'] + item.id}"
                                                          method="post"
                                                          style="display: inline;"
                                                          th:attr="data-confirm=${action['confirm']}"
                                                          onsubmit="return !this.dataset.confirm || confirm(this.dataset.confirm)">
                                                        <input type="hidden"
                                                               th:if="${_csrf != null}"
                                                               th:name="${_csrf.parameterName}"
                                                               th:value="${_csrf.token}" />
                                                        <button type="submit" th:class="${action['btnClass']}">
                                                            <i th:class="${action['icon']}"></i> <span th:text="${action['text']}"></span>
                                                        </button>
                                                    </form>
                                                </th:block>
                                            </div>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        <!-- </div> -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div th:replace="~{fragments :: footer}"></div>

    <!-- 脚本 -->
    <th:block th:replace="~{fragments :: scripts}"></th:block>
    
    <script th:if="${customScript != null}" th:utext="${customScript}"></script>

    <!-- 通用列表：前端模糊搜索（作用于卡片和表格） -->
    <script>
        (() => {
            const input = document.getElementById('genericSearchInput');
            if (!input) return;

            const norm = (s) => (s || '').toString().toLowerCase();

            const applyFilter = () => {
                const kw = norm(input.value).trim();

                // 移动端卡片：generic-cards-grid 中带 data-filters 的元素
                document.querySelectorAll('.generic-cards-grid [data-filters]').forEach((el) => {
                    // 让整张卡片所在的列一起隐藏，避免出现空白间距
                    const col = el.closest('[class*="col-"]') || el;
                    const text = norm(el.textContent);
                    const meta = norm(el.getAttribute('data-filters') || '');
                    const hay = text + ' ' + meta;
                    if (!kw) {
                        col.classList.remove('d-none');
                    } else {
                        col.classList.toggle('d-none', !hay.includes(kw));
                    }
                });

                // 桌面表格：generic-table-desktop 中带 data-filters 的行
                document.querySelectorAll('.generic-table-desktop tbody tr[data-filters]').forEach((tr) => {
                    const text = norm(tr.textContent);
                    const meta = norm(tr.getAttribute('data-filters') || '');
                    const hay = text + ' ' + meta;
                    if (!kw) {
                        tr.classList.remove('d-none');
                    } else {
                        tr.classList.toggle('d-none', !hay.includes(kw));
                    }
                });
            };

            input.addEventListener('input', applyFilter);
        })();
    </script>
</body>
</html>
