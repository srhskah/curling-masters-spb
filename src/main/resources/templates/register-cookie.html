<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('注册')}">
</head>

<body th:classappend="${ipBgClass}">
    <!-- 登录导航栏 -->
    <div th:replace="~{fragments :: navbar-login}"></div>

    <div class="container">
        <div class="register-container">
            <h2 class="text-center mb-4">注册账号</h2>

            <!-- 显示错误消息 -->
            <div th:replace="~{fragments :: error-alert}"></div>

            <!-- 显示成功消息 -->
            <div th:replace="~{fragments :: success-alert}"></div>

            <form th:action="@{/user/register}" method="post" id="registerForm">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名 <small class="text-muted">(支持中文、emoji、Unicode字符)</small></label>
                    <input type="text" class="form-control" id="username" name="username" required
                           placeholder="例如：张三、Dragon、🎯玩家、ユーザー">
                    <div id="usernameValidation" class="form-text"></div>
                    <div id="usernameStats" class="form-text"></div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">邮箱</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">确认密码</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                </div>

                <!-- 记住我选项 -->
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
                    <label class="form-check-label" for="rememberMe">
                        记住我的用户名
                    </label>
                </div>

                <!-- 用户偏好设置 -->
                <div class="mb-3">
                    <label for="theme" class="form-label">主题偏好</label>
                    <select class="form-select" id="theme" name="theme">
                        <option value="">默认</option>
                        <option value="light">浅色主题</option>
                        <option value="dark">深色主题</option>
                        <option value="auto">跟随系统</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="language" class="form-label">语言偏好</label>
                    <select class="form-select" id="language" name="language">
                        <option value="">默认</option>
                        <option value="zh-CN">简体中文</option>
                        <option value="zh-TW">繁体中文</option>
                        <option value="en">English</option>
                    </select>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">注册</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <p>已有账号？<a href="/user/login">立即登录</a></p>
            </div>

            <!-- Cookie说明 -->
            <div class="mt-4 p-3 bg-light rounded">
                <h6>关于 Cookie</h6>
                <small class="text-muted">
                    <p>我们使用 Cookie 来保存您的偏好设置，包括：</p>
                    <ul>
                        <li>用户名（便于下次登录）</li>
                        <li>主题偏好（浅色/深色主题）</li>
                        <li>语言偏好（界面语言）</li>
                        <li>登录状态（保持登录）</li>
                    </ul>
                    <p>您的偏好设置将保存 7-30 天，您可以随时清除这些设置。</p>
                </small>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div th:replace="~{fragments :: footer}"></div>

    <!-- 脚本 -->
    <th:block th:replace="~{fragments :: scripts}"></th:block>
    
    <script>
        // 实时用户名验证
        document.getElementById('username').addEventListener('input', function(e) {
            const username = e.target.value;
            const validationDiv = document.getElementById('usernameValidation');
            const statsDiv = document.getElementById('usernameStats');
            
            if (username.length === 0) {
                validationDiv.innerHTML = '';
                statsDiv.innerHTML = '';
                return;
            }
            
            // 验证用户名
            const result = FormValidator.validateUsername(username);
            
            if (result.valid) {
                validationDiv.innerHTML = `<span class="text-success">${result.message}</span>`;
                // 显示字符统计
                FormValidator.displayUsernameStats(username, 'usernameStats');
            } else {
                validationDiv.innerHTML = `<span class="text-danger">${result.message}</span>`;
                statsDiv.innerHTML = '';
            }
        });

        // 表单验证和提交
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 验证用户名
            const usernameResult = FormValidator.validateUsername(username);
            if (!usernameResult.valid) {
                e.preventDefault();
                alert(usernameResult.message);
                document.getElementById('username').focus();
                return false;
            }

            // 验证邮箱
            const emailResult = FormValidator.validateEmail(email);
            if (!emailResult.valid) {
                e.preventDefault();
                alert(emailResult.message);
                document.getElementById('email').focus();
                return false;
            }

            // 验证密码
            const passwordResult = FormValidator.validatePassword(password);
            if (!passwordResult.valid) {
                e.preventDefault();
                alert(passwordResult.message);
                document.getElementById('password').focus();
                return false;
            }

            // 验证密码确认
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('两次输入的密码不一致');
                document.getElementById('confirmPassword').focus();
                return false;
            }

            // 显示加载状态
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 注册中...';
            submitBtn.disabled = true;

            // 如果超时，恢复按钮状态
            setTimeout(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }, 10000);
        });

        // 页面加载完成后聚焦
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
