<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - Curling Masters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/main.css?v=1.1}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .table-container {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            margin: 2rem 0;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{fragments :: navbar}"></div>
    <!-- <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Curling Masters</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">返回首页</a>
            </div>
        </div>
    </nav> -->

    <div class="container">
        <div class="table-container">
            <h2 class="mb-4">用户管理</h2>

            <!-- 显示消息 -->
            <div th:if="${success}" class="alert alert-success" role="alert">
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <span th:text="${error}"></span>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>邮箱</th>
                            <th>角色</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <span th:if="${user.role == 0}" class="badge bg-danger">超级管理员</span>
                                <span th:if="${user.role == 1}" class="badge bg-warning">普通管理员</span>
                                <span th:if="${user.role == 2}" class="badge bg-secondary">普通用户</span>
                            </td>
                            <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <!-- 编辑权限：只有超级管理员可以编辑其他用户 -->
                                <a th:if="${#authentication.principal.role == 0}" th:href="@{'/user/edit/' + ${user.id}}" class="btn btn-sm btn-primary">编辑</a>
                                
                                <!-- 重置密码权限：超级管理员和普通管理员都可以使用 -->
                                <button th:if="${#authentication.principal.role <= 1 and user.id != #authentication.principal.id}" 
                                        type="button" class="btn btn-sm btn-warning"
                                        onclick="resetPassword(this)" th:data-id="${user.id}" th:data-username="${user.username}">
                                    重置密码
                                </button>
                                
                                <!-- 删除权限：只有超级管理员可以删除其他用户 -->
                                <button th:if="${#authentication.principal.role == 0 and user.role != 0 and user.id != #authentication.principal.id}" 
                                        type="button" class="btn btn-sm btn-danger"
                                        onclick="deleteUser(this)" th:data-id="${user.id}" th:data-username="${user.username}">
                                    删除
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认删除</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    确定要删除用户 <span id="deleteUsername"></span> 吗？
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <form id="deleteForm" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-danger">删除</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 重置密码确认模态框 -->
    <div class="modal fade" id="resetPasswordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认重置密码</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>确定要重置用户 <strong id="resetUsername"></strong> 的密码吗？</p>
                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle"></i>
                        <strong>注意：</strong>
                        <ul class="mb-0 mt-2">
                            <li>密码将被重置为：<code>123456</code></li>
                            <li>该用户下次登录时必须修改密码</li>
                            <li>请确保已通知该用户新密码</li>
                        </ul>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <form id="resetPasswordForm" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-key"></i> 确认重置
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function deleteUser(button) {
            const userId = button.getAttribute('data-id');
            const username = button.getAttribute('data-username');

            document.getElementById('deleteUsername').textContent = username;
            document.getElementById('deleteForm').action = '/user/delete/' + userId;

            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }

        function resetPassword(button) {
            const userId = button.getAttribute('data-id');
            const username = button.getAttribute('data-username');

            document.getElementById('resetUsername').textContent = username;
            document.getElementById('resetPasswordForm').action = '/user/reset-password/' + userId;

            new bootstrap.Modal(document.getElementById('resetPasswordModal')).show();
        }
    </script>

    <!-- 页脚 -->
    <div th:replace="~{fragments :: footer}"></div>
    <script th:src="@{/js/main.js?v=1.1}"></script>
</body>
</html>
