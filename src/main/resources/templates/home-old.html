<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - Curling Masters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2770%25%27%20font-size%3D%2772%27%20text-anchor%3D%27middle%27%3E%F0%9F%A5%8C%3C/text%3E%3C/svg%3E">
    <link rel="shortcut icon"
          href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2770%25%27%20font-size%3D%2772%27%20text-anchor%3D%27middle%27%3E%F0%9F%A5%8C%3C/text%3E%3C/svg%3E">
    <link th:href="@{/css/main.css?v=1.1}" rel="stylesheet">
</head>
<body th:classappend="${ipBgClass}">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <!-- <a class="navbar-brand" href="/">Curling Masters</a> -->
            <a class="navbar-brand" href="/">
                <img th:src="@{/images/Logo Trsp Stripe.png}" alt="Curling Masters Logo" style="height: 40px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首页</a>
                    </li>
                    <li th:if="${#authorization.expression('hasRole(''ROLE_SUPER_ADMIN'') or hasRole(''ROLE_ADMIN'')')}" class="nav-item">
                        <a class="nav-link" href="/user/manage">用户管理</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <span th:text="${username}">用户名</span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/user/reset-password">重置密码</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" onclick="document.getElementById('logoutForm').submit();">退出登录</a></li>
                        </ul>
                    </li>
                </ul>
                <form id="logoutForm" th:action="@{/logout}" method="post" style="display: none;">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-card">
            <h1 class="text-center mb-4">欢迎来到 Curling Masters</h1>
            <p class="text-center">您已成功登录系统</p>

            <div class="row mt-4">
                <div class="col-md-4">
                    <div class="card bg-light text-dark">
                        <div class="card-body text-center">
                            <h5 class="card-title">用户信息</h5>
                            <p class="card-text">用户名: <span th:text="${username}"></span></p>
                            <p class="card-text">角色: 
                                <span th:if="${#authorization.expression('hasRole(''ROLE_SUPER_ADMIN'')')}" class="badge bg-danger">超级管理员</span>
                                <span th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')') and not #authorization.expression('hasRole(''ROLE_SUPER_ADMIN'')')}" class="badge bg-warning text-dark">管理员</span>
                                <span th:if="${#authorization.expression('hasRole(''ROLE_USER'')') and not #authorization.expression('hasRole(''ROLE_ADMIN'')') and not #authorization.expression('hasRole(''ROLE_SUPER_ADMIN'')')}" class="badge bg-info">普通用户</span>
                            </p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light text-dark">
                        <div class="card-body text-center">
                            <h5 class="card-title">账户管理</h5>
                            <a href="/user/reset-password" class="btn btn-primary">重置密码</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-4" th:if="${#authorization.expression('hasRole(''ROLE_SUPER_ADMIN'') or hasRole(''ROLE_ADMIN'')')}">
                    <div class="card bg-light text-dark">
                        <div class="card-body text-center">
                            <h5 class="card-title">用户管理</h5>
                            <a href="/user/manage" class="btn btn-success">管理用户</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js?v=1.1}"></script>
</body>
</html>
