<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- 赛事详情页与 H2H 共用：原生 Bootstrap 场次详情/录分弹窗 + 电子签名弹窗 -->
<th:block th:fragment="groupMatchScoreModalAndSignature">
    <div id="groupMatchScoreModalMeta" class="d-none"
         th:attr="data-current-user-id=${currentUser != null && currentUser.id != null ? #strings.toString(currentUser.id) : ''}"></div>

    <div class="modal fade" id="groupMatchScoreModal" tabindex="-1" style="z-index:1919810;">
        <div class="modal-dialog modal-xl modal-fullscreen-sm-down modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">单场比赛录分</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="groupMatchIdInput">
                    <div id="groupMatchReadOnlyHint" class="alert alert-info py-2 small d-none mb-2">
                        <i class="bi bi-eye"></i> 当前为<strong>只读查看</strong>。仅<strong>办赛人员</strong>（管理员/主办）与<strong>本场比赛双方选手</strong>可修改比分、先后手、保存与验收。
                    </div>
                    <div class="mb-2 small text-muted" id="groupMatchTitle"></div>
                    <div class="mb-2 d-flex align-items-center gap-2 flex-wrap group-match-action-bar">
                        <button type="button" class="btn btn-outline-secondary btn-sm" id="groupMatchCopyBtn">复制本场战绩文本</button>
                        <button type="button" class="btn btn-outline-secondary btn-sm" id="groupMatchExportPdfBtn">导出本场战绩PDF</button>
                    </div>
                    <div class="mb-2 small text-muted" id="groupHammerTimeline"></div>
                    <div class="row g-2 mb-2">
                        <div class="col-md-4">
                            <label class="form-label">开局后手</label>
                            <select class="form-select" id="groupFirstEndHammer">
                                <option value="">不设置</option>
                                <option value="1" id="groupHammerPlayer1Option">player1</option>
                                <option value="2" id="groupHammerPlayer2Option">player2</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">局数</label>
                            <input type="number" min="1" max="20" id="groupSetCount" class="form-control" value="8">
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button type="button" class="btn btn-outline-primary w-100" id="groupRenderScoreRowsBtn" onclick="renderGroupScoreRows()">生成/重置局数</button>
                        </div>
                    </div>
                    <div class="table-responsive score-entry-wrap match-score-mobile-optimized">
                        <table class="table table-sm table-bordered align-middle score-entry-table">
                            <thead class="table-light">
                            <tr><th style="width: 26%">选手名称</th><th style="width: 18%">总比分</th><th>局次</th></tr>
                            </thead>
                            <tbody id="groupScoreRows"></tbody>
                        </table>
                    </div>
                    <div class="mb-2 d-flex align-items-center gap-2" id="groupSignatureRow">
                        <button type="button" class="btn btn-outline-secondary btn-sm" id="groupSignatureOpenBtn" onclick="openSignatureModal()">手写电子签名</button>
                        <span class="small text-muted" id="groupSignatureStatus">未签名</span>
                    </div>
                    <div class="mt-2">
                        <div class="small fw-bold">验收信息</div>
                        <div class="small text-muted mb-2" id="groupAcceptanceStatusLine">暂无</div>
                        <div class="table-responsive">
                            <table class="table table-sm table-bordered align-middle mb-0" id="groupAcceptanceTable">
                                <thead class="table-light">
                                <tr>
                                    <th style="width: 18%">验收人</th>
                                    <th style="width: 50%">电子签名</th>
                                    <th style="width: 32%">验收时间</th>
                                </tr>
                                </thead>
                                <tbody id="groupAcceptanceTbody">
                                <tr><td colspan="3" class="text-muted text-center">暂无</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="mt-2">
                        <div class="small fw-bold">比分修改记录</div>
                        <div class="table-responsive">
                            <table class="table table-sm table-striped table-hover table-bordered align-middle mb-0" id="groupEditLogTable">
                                <thead class="table-light">
                                <tr>
                                    <th style="width: 10%">局次</th>
                                    <th style="width: 18%">修改人</th>
                                    <th style="width: 26%">修改前</th>
                                    <th style="width: 26%">修改后</th>
                                    <th style="width: 20%">修改时间</th>
                                </tr>
                                </thead>
                                <tbody id="groupEditLogTbody">
                                <tr><td colspan="5" class="text-muted text-center">暂无</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary" id="groupSaveScoreBtn" onclick="saveGroupMatchScore()">保存比分</button>
                    <button type="button" class="btn btn-success" id="groupAcceptScoreBtn" onclick="acceptGroupMatchScore()">验收并锁定</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="signatureModal" tabindex="-1" style="z-index:1919815;">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">手写电子签名</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <canvas id="signatureCanvas" width="420" height="180" style="width:100%;border:1px solid #ced4da;border-radius:6px;background:#fff;"></canvas>
                    <div class="small text-muted mt-2">请在签名框内手写，保存后用于验收记录。</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" onclick="clearSignatureCanvas()">清除</button>
                    <button type="button" class="btn btn-primary" onclick="saveSignatureCanvas()">使用该签名</button>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
