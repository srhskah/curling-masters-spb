<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑用户 - Curling Masters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2770%25%27%20font-size%3D%2772%27%20text-anchor%3D%27middle%27%3E%F0%9F%A5%8C%3C/text%3E%3C/svg%3E">
    <link rel="shortcut icon"
          href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2770%25%27%20font-size%3D%2772%27%20text-anchor%3D%27middle%27%3E%F0%9F%A5%8C%3C/text%3E%3C/svg%3E">
    <link th:href="@{/css/main.css?v=1.1}" rel="stylesheet">
    <style>
        .edit-container {
            max-width: 500px;
            margin: 3rem auto;
            padding: 2rem;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border-radius: 10px;
            background: white;
        }
    </style>
</head>
<body th:classappend="${ipBgClass}">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Curling Masters</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/user/manage">返回用户管理</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="edit-container">
            <h2 class="mb-4">编辑用户</h2>

            <form th:action="@{'/user/edit/' + ${user.id}}" method="post">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" th:value="${user.username}" readonly>
                    <div class="form-text">用户名不可修改</div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">邮箱</label>
                    <input type="email" class="form-control" id="email" name="email" th:value="${user.email}" required>
                </div>

                <div class="mb-3">
                    <label for="role" class="form-label">角色</label>
                    <select class="form-select" id="role" name="role" required>
                        <option th:value="2" th:selected="${user.role == 2}">普通用户</option>
                        <option th:value="1" th:selected="${user.role == 1}">普通管理员</option>
                        <option th:value="0" th:selected="${user.role == 0}">超级管理员</option>
                    </select>
                    <div class="form-text">注意：只能有一个超级管理员</div>
                </div>

                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input"
                               type="checkbox"
                               id="includeInTotalRanking"
                               name="includeInTotalRanking"
                               th:checked="${user.includeInTotalRanking == null or user.includeInTotalRanking}">
                        <label class="form-check-label" for="includeInTotalRanking">
                            计入总排名
                        </label>
                    </div>
                    <div class="form-text">关闭后：该用户不会出现在“总排名”中（赛季排名不受影响）</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="/user/manage" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js?v=1.1}"></script>
</body>
</html>
