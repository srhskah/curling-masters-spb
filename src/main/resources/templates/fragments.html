<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- 公共头部片段 -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Curling Masters'">Curling Masters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/main.css?v=1.1}" rel="stylesheet">
</head>

<!-- 导航栏片段 -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            <img th:src="@{/images/Logo Trsp Stripe.png}" alt="Curling Masters Logo" style="height: 40px;">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">首页</a>
                </li>
                <li th:if="${username != null and (#authorization.expression('hasRole(''ROLE_SUPER_ADMIN'')') or #authorization.expression('hasRole(''ROLE_ADMIN'')'))}" class="nav-item">
                    <a class="nav-link" href="/user/manage">用户管理</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li th:if="${username}" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                        <span th:text="${username ?: '用户'}">用户名</span>
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{'/user/profile/' + ${#authentication.principal.id}}">个人中心</a></li>
                        <li><a class="dropdown-item" href="/user/reset-password">重置密码</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" onclick="document.getElementById('logoutForm').submit();">退出登录</a></li>
                    </ul>
                </li>
            </ul>
            <form id="logoutForm" th:action="@{/logout}" method="post" style="display: none;">
            </form>
        </div>
    </div>
</nav>

<!-- 登录导航栏片段（未登录用户使用） -->
<nav th:fragment="navbar-login" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            <img th:src="@{/images/Logo Trsp Stripe.png}" alt="Curling Masters Logo" style="height: 40px;">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavLogin">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavLogin">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/login">登录</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/user/register">注册</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- 页脚片段 -->
<footer th:fragment="footer" class="footer">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <!-- <h5>Curling Masters</h5> -->
                <a href="/">
                    <img th:src="@{/images/Logo W2.png}" alt="Curling Masters Logo" style="height: 4.5em;">
                </a>
                <p>冰壶大师赛 统一赛事管理系统</p>
                <p>&copy; 2026 Curling Masters. All rights reserved.</p>
            </div>
            <div class="col-md-6 text-end">
                <!-- <p>&copy; 2026 Curling Masters. All rights reserved.</p> -->
            </div>
        </div>
    </div>
</footer>

<!-- 公共脚本片段 -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js?v=1.1}"></script>
</th:block>

<!-- 消息提示片段 -->
<div th:fragment="alert(message, type)" th:if="${message}" class="container mt-3">
    <div th:class="'alert alert-' + ${type} + ' alert-dismissible fade show'" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<!-- 错误消息片段 -->
<div th:fragment="error-alert" th:if="${error}" class="container mt-3">
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<!-- 成功消息片段 -->
<div th:fragment="success-alert" th:if="${message}" class="container mt-3">
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<!-- Cookie 同意横幅 -->
<div th:fragment="cookie-banner" id="cookieBanner" class="cookie-banner" style="display: none;">
    <div class="container">
        <p class="mb-0">
            我们使用 Cookie 来改善您的浏览体验、分析网站使用情况并提供个性化内容。
            继续使用本网站即表示您同意我们的 Cookie 政策。
        </p>
        <div class="btn-group">
            <button type="button" class="btn btn-outline-light btn-sm" onclick="acceptAllCookies()">
                接受全部
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="acceptEssentialCookies()">
                仅必需
            </button>
            <button type="button" class="btn btn-outline-info btn-sm" onclick="showCookieSettings()">
                设置
            </button>
        </div>
    </div>
</div>

<!-- Cookie 设置模态框 -->
<div th:fragment="cookie-settings-modal" class="modal fade" id="cookieSettingsModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Cookie 设置</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="essentialCookies" checked disabled>
                        <label class="form-check-label" for="essentialCookies">
                            <strong>必需 Cookie</strong> - 网站正常运行所必需
                        </label>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="preferenceCookies">
                        <label class="form-check-label" for="preferenceCookies">
                            <strong>偏好设置 Cookie</strong> - 记住您的设置（主题、语言等）
                        </label>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="analyticsCookies">
                        <label class="form-check-label" for="analyticsCookies">
                            <strong>分析 Cookie</strong> - 帮助我们改进网站
                        </label>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="marketingCookies">
                        <label class="form-check-label" for="marketingCookies">
                            <strong>营销 Cookie</strong> - 用于个性化广告
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveCookieSettings()">保存设置</button>
            </div>
        </div>
    </div>
</div>

</html>
