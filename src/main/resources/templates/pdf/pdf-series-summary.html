<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${title}">系列积分汇总</title>
    <style>
        body { font-family: "WenQuanYi Micro Hei","WenQuanYi Zen Hei","Noto Emoji","DejaVu Sans",sans-serif; font-size: 12px; color: #111; }
        h2 { margin: 0; font-size: 16px; }
        .muted { color: #666; }
        .meta { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 0 0 10px; }
        .logo { width: 28.6%; max-width: 220px; min-width: 120px; height: auto; }
        table { width: 100%; border-collapse: collapse; table-layout: auto; }
        th, td { border: 1px solid #ddd; padding: 6px 8px; vertical-align: middle; text-align: center; }
        th { background: #f3f3f3; }
        .withdrawn { text-decoration: line-through; color: #777; }
        .highlight { background: #fff3cd; font-weight: 600; }
        .podium-gold { background: #d4af37; color: #000; font-weight: 700; }
        .podium-silver { background: #c0c0c0; color: #000; font-weight: 700; }
        .podium-bronze { background: #cd7f32; color: #fff; font-weight: 700; }
    </style>
</head>
<body>
<div class="meta">
    <img th:if="${logoDataUri != null}" class="logo" th:src="${logoDataUri}" alt="logo"/>
    <div style="flex: 1 1 auto;">
        <h2 th:text="${title}">系列积分汇总</h2>
        <div class="muted" th:if="${exportedAt != null}" th:text="${'导出时间：' + exportedAt}">导出时间</div>
    </div>
</div>

<table>
    <thead>
    <tr>
        <th>选手</th>
        <th th:if="${showFinalRank}">最终排名</th>
        <th>最终积分</th>
        <th th:if="${columns != null and !#lists.isEmpty(columns)}"
            th:each="c : ${columns}"
            th:text="${c.label}">CM1000-1</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r : ${rows}">
        <td>
            <span th:if="${r.withdrawn}" class="withdrawn" th:text="${r.username}">退赛</span>
            <span th:if="${!r.withdrawn}" th:text="${r.username}">选手</span>
            <span th:if="${r.withdrawn}" class="muted">（退赛（不计入排名））</span>
        </td>
        <td th:if="${showFinalRank}"
            th:classappend="${r.finalRank != null and r.finalRank == 1 ? ' podium-gold' : (r.finalRank != null and r.finalRank == 2 ? ' podium-silver' : (r.finalRank != null and r.finalRank == 3 ? ' podium-bronze' : ''))}"
            th:text="${r.finalRank != null ? r.finalRank : ''}">1</td>
        <td th:text="${r.finalPoints}">0</td>
        <td th:if="${columns != null and !#lists.isEmpty(columns)}"
            th:each="c : ${columns}"
            th:classappend="${
              (r.bestKey != null and r.bestKey == c.key ? ' highlight' : '') +
              (r.finishByKey != null and r.finishByKey[c.key] != null and r.finishByKey[c.key] == 1 ? ' podium-gold' :
                (r.finishByKey != null and r.finishByKey[c.key] != null and r.finishByKey[c.key] == 2 ? ' podium-silver' :
                  (r.finishByKey != null and r.finishByKey[c.key] != null and r.finishByKey[c.key] == 3 ? ' podium-bronze' : '')))
            }"
            th:text="${r.pointsByKey != null and r.pointsByKey[c.key] != null ? r.pointsByKey[c.key] : ''}">0</td>
    </tr>
    <tr th:if="${rows == null or #lists.isEmpty(rows)}">
        <td th:attr="colspan=${(columns != null ? #lists.size(columns) : 0) + (showFinalRank ? 3 : 2)}"
            class="muted" style="text-align:center;">暂无数据</td>
    </tr>
    </tbody>
</table>
</body>
</html>
