<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${title}">消息通知</title>
    <style>
        body { font-family: "WenQuanYi Micro Hei", "WenQuanYi Zen Hei", "DejaVu Sans", sans-serif; font-size: 14px; color: #222; }
        h2 { margin: 0; font-size: 18px; }
        .muted { color: #666; font-size: 12px; }
        .meta { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin: 0 0 16px; }
        .logo { width: 28.6%; max-width: 220px; min-width: 120px; height: auto; }
        .content { margin-top: 8px; }
        .markdown-body { line-height: 1.55; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin: 0.75em 0 0.4em; font-weight: 600; }
        .markdown-body p { margin: 0.5em 0; }
        .markdown-body ul, .markdown-body ol { padding-left: 1.35em; margin: 0.5em 0; }
        .markdown-body li { overflow-wrap: anywhere; word-break: break-word; }
        .markdown-body li br { line-height: inherit; }
        .markdown-body ul.contains-task-list { list-style-type: none; padding-left: 1.75em; }
        .markdown-body li.task-list-item { list-style-type: none; margin-left: -1.2em; }
        .markdown-body li.task-list-item input[type="checkbox"] { margin-right: 0.35em; vertical-align: middle; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin: 0.75em 0; font-size: 13px; }
        .markdown-body th, .markdown-body td { border: 1px solid #ccc; padding: 0.35rem 0.5rem; text-align: left; }
        .markdown-body th { background: #f0f0f0; }
        .markdown-body pre { white-space: pre-wrap; word-wrap: break-word; padding: 0.6rem 0.75rem; background: #f6f6f6; border: 1px solid #e0e0e0; border-radius: 4px; margin: 0.6em 0; font-size: 12px; }
        .markdown-body code { font-family: "DejaVu Sans Mono", monospace; font-size: 0.92em; background: #eee; padding: 0.08em 0.3em; border-radius: 3px; }
        .markdown-body pre code { background: transparent; padding: 0; }
        .markdown-body blockquote { margin: 0.6em 0; padding-left: 0.9em; border-left: 3px solid #ccc; color: #555; }
        .markdown-body hr { border: 0; border-top: 1px solid #ccc; margin: 1em 0; }
        .markdown-body hr.md-list-sep { border: 0; margin: 0; height: 0; overflow: hidden; opacity: 0; visibility: hidden; }
        .markdown-body a { color: #0645ad; }
        .markdown-body img { max-width: 100%; height: auto; }
        .markdown-body del { text-decoration: line-through; color: #666; }
    </style>
</head>
<body>
<div class="meta">
    <img th:if="${logoDataUri != null}" class="logo" th:src="${logoDataUri}" alt="logo"/>
    <div style="flex: 1 1 auto;">
        <h2 th:text="${message != null ? message.title : '消息通知'}">消息通知</h2>
        <div class="muted" th:if="${message != null and message.publishedAt != null}"
             th:text="${'发布时间：' + #temporals.format(message.publishedAt,'yyyy-MM-dd HH:mm:ss')}">发布时间</div>
        <div class="muted" th:if="${message != null and message.authorUsername != null}"
             th:text="${'发起者：' + message.authorUsername}">发起者</div>
        <div class="muted" th:if="${exportedAt != null}" th:text="${'导出时间：' + exportedAt}">导出时间</div>
    </div>
</div>
<div class="content markdown-body" th:utext="${message != null ? message.contentHtml : ''}"></div>
</body>
</html>
