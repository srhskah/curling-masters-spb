<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${title}">赛事排名</title>
    <style>
        body { font-family: "WenQuanYi Micro Hei","WenQuanYi Zen Hei","Noto Emoji","DejaVu Sans",sans-serif; font-size: 12px; color: #111; }
        h2 { margin: 0; font-size: 16px; }
        .muted { color: #666; }
        .meta { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 0 0 12px; }
        .logo { width: 28.6%; max-width: 220px; min-width: 120px; height: auto; }
        table { width: 100%; border-collapse: collapse; table-layout: auto; }
        th, td { border: 1px solid #ddd; padding: 6px 8px; vertical-align: middle; text-align: center; }
        th { background: #f3f3f3; }
        .muted { color: #666; }
        .withdrawn { text-decoration: line-through; color: #777; }
        .podium-gold { background: #d4af37; color: #000; font-weight: 700; }
        .podium-silver { background: #c0c0c0; color: #000; font-weight: 700; }
        .podium-bronze { background: #cd7f32; color: #fff; font-weight: 700; }
        .section-title { margin: 14px 0 8px; font-size: 14px; font-weight: 700; }
        .nowrap { white-space: nowrap; }
        .small { font-size: 11px; }
    </style>
</head>
<body>
<div class="meta">
    <img th:if="${logoDataUri != null}" class="logo" th:src="${logoDataUri}" alt="logo"/>
    <div style="flex: 1 1 auto;">
        <h2 th:text="${title}">赛事排名</h2>
        <div class="muted" th:if="${exportedAt != null}" th:text="${'导出时间：' + exportedAt}">导出时间</div>
    </div>
</div>

<table>
    <thead>
    <tr>
        <th>排名</th>
        <th>选手</th>
        <th>积分</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r : ${rankings}">
        <td th:classappend="${r.rank == 1 ? ' podium-gold' : (r.rank == 2 ? ' podium-silver' : (r.rank == 3 ? ' podium-bronze' : ''))}"
            th:text="${r.rank}">1</td>
        <td>
            <span th:if="${r.withdrawn}" class="withdrawn" th:text="${r.username}">退赛</span>
            <span th:if="${!r.withdrawn}" th:text="${r.username}">选手</span>
            <span th:if="${r.withdrawn}" class="muted">（退赛（不计入排名））</span>
        </td>
        <td th:text="${r.points != null ? r.points : 0}">0</td>
    </tr>
    <tr th:if="${rankings == null or #lists.isEmpty(rankings)}">
        <td colspan="3" class="muted" style="text-align:center;">暂无数据</td>
    </tr>
    </tbody>
</table>

<div class="section-title">比赛明细</div>
<div th:if="${matchDetails == null or #lists.isEmpty(matchDetails)}" class="muted">暂无比赛明细</div>
<div th:each="m : ${matchDetails}" style="margin-bottom: 14px; border:1px solid #ddd; padding:8px;">
    <div style="font-weight:700; margin-bottom:4px;"
         th:text="${(m.category != null ? m.category : '-') + '（' + (m.phaseCode != null ? m.phaseCode : '-') + '） ' + m.player1Name + ' vs ' + m.player2Name + '  总比分：' + (m.totalText != null ? m.totalText : '-')}">
        比赛标题
    </div>
    <table class="small">
        <thead>
        <tr>
            <th>选手</th>
            <th th:each="s : ${m.sets}" th:text="${s.setNumber}">1</th>
            <th>总得分</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>
                <span th:text="${m.player1Name}">选手1</span>
                <span th:if="${m.sets != null and !#lists.isEmpty(m.sets) and m.sets[0].hammer == m.player1Name}"> 🔨</span>
            </td>
            <td th:each="s : ${m.sets}" th:text="${s.player1ScoreText}">0</td>
            <td th:text="${m.player1Total != null ? m.player1Total : 0}">0</td>
        </tr>
        <tr>
            <td>
                <span th:text="${m.player2Name}">选手2</span>
                <span th:if="${m.sets != null and !#lists.isEmpty(m.sets) and m.sets[0].hammer == m.player2Name}"> 🔨</span>
            </td>
            <td th:each="s : ${m.sets}" th:text="${s.player2ScoreText}">0</td>
            <td th:text="${m.player2Total != null ? m.player2Total : 0}">0</td>
        </tr>
        <tr th:if="${m.sets == null or #lists.isEmpty(m.sets)}">
            <td colspan="3" class="muted">暂无逐局信息</td>
        </tr>
        </tbody>
    </table>

    <div style="margin-top:6px; font-weight:700;">修改记录</div>
    <table class="small">
        <thead>
        <tr>
            <th style="width:12%">局次</th>
            <th style="width:18%">修改人</th>
            <th style="width:20%">修改前</th>
            <th style="width:20%">修改后</th>
            <th style="width:30%">时间</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="l : ${m.editLogs}">
            <td th:text="${l.setNumber}">1</td>
            <td th:text="${l.editorUsername}">用户</td>
            <td th:text="${l.oldScore}">0:0</td>
            <td th:text="${l.newScore}">1:0</td>
            <td th:text="${l.editedAt != null ? #temporals.format(l.editedAt, 'yyyy-MM-dd HH:mm:ss') : '-'}">时间</td>
        </tr>
        <tr th:if="${m.editLogs == null or #lists.isEmpty(m.editLogs)}">
            <td colspan="5" class="muted">无修改记录</td>
        </tr>
        </tbody>
    </table>

    <div style="margin-top:6px; font-weight:700;">验收信息（含签名）</div>
    <div class="small nowrap" th:if="${m.acceptances != null and !#lists.isEmpty(m.acceptances)}">
        <span th:each="a,st : ${m.acceptances}"
              th:text="${a.username + '（' + (
                  (a.signature == null or #strings.isEmpty(a.signature)) ? '无签名'
                  : (#strings.startsWith(a.signature, 'data:image/') ? '[手写签名]' : a.signature)
              ) + '）@' + (a.acceptedAt != null ? #temporals.format(a.acceptedAt, 'yyyy-MM-dd HH:mm:ss') : '-') + (st.last ? '' : '； ')}">验收人</span>
    </div>
    <div class="small muted" th:if="${m.acceptances == null or #lists.isEmpty(m.acceptances)}">暂无验收</div>
</div>
</body>
</html>
