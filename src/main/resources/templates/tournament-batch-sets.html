<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'批量设置比赛局数 - ' + ${tournament.levelCode}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2770%25%27%20font-size%3D%2772%27%20text-anchor%3D%27middle%27%3E%F0%9F%A5%8C%3C/text%3E%3C/svg%3E">
    <link rel="shortcut icon"
          href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2770%25%27%20font-size%3D%2772%27%20text-anchor%3D%27middle%27%3E%F0%9F%A5%8C%3C/text%3E%3C/svg%3E">
</head>
<body th:classappend="${ipBgClass}">
    <div th:replace="~{fragments :: navbar}"></div>
    
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <h4>
                                <i class="bi bi-gear"></i>
                                批量设置比赛局数
                                <span class="badge bg-primary ms-2" th:text="${tournament.levelCode}"></span>
                            </h4>
                            <a th:href="@{/tournament/detail/{id}(id=${tournament.id})}" 
                               class="btn btn-secondary btn-sm">
                                <i class="bi bi-arrow-left"></i> 返回赛事详情
                            </a>
                        </div>
                    </div>
                    <div class="card-body">
                        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${success}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        
                        <form th:action="@{/tournament/batch-set-sets/{tournamentId}(tournamentId=${tournament.id})}" 
                              method="post" id="batchSetForm">
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="numberOfSets" class="form-label">
                                        <i class="bi bi-hash"></i> 设置局数 <span class="text-danger">*</span>
                                    </label>
                                    <input type="number" class="form-control" id="numberOfSets" 
                                           name="numberOfSets" min="1" max="20" value="3" required>
                                    <div class="form-text">每场比赛的局数（1-20局）</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">
                                        <i class="bi bi-info-circle"></i> 操作说明
                                    </label>
                                    <div class="form-control-plaintext">
                                        <small class="text-muted">
                                            将为选中的比赛重新设置指定局数，<br>
                                            现有比分数据将被清除。
                                        </small>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <h6><i class="bi bi-list-check"></i> 选择要设置的比赛</h6>
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" id="selectAll" 
                                           onchange="toggleAllMatches()">
                                    <label class="form-check-label" for="selectAll">
                                        <strong>全选/取消全选</strong>
                                    </label>
                                </div>
                                
                                <div class="table-responsive">
                                    <table class="table table-sm table-hover">
                                        <thead class="table-light">
                                            <tr>
                                                <th width="50">选择</th>
                                                <th>轮次</th>
                                                <th>类别</th>
                                                <th>选手1</th>
                                                <th>选手2</th>
                                                <th>当前局数</th>
                                                <th>状态</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="matchInfo : ${matchInfoList}">
                                                <td>
                                                    <input class="form-check-input match-checkbox" type="checkbox" 
                                                           name="matchIds" th:value="${matchInfo.match.id}" checked>
                                                </td>
                                                <td th:text="${matchInfo.match.round}"></td>
                                                <td th:text="${matchInfo.match.category ?: '-'}"></td>
                                                <td th:text="${matchInfo.player1Name}"></td>
                                                <td th:text="${matchInfo.player2Name}"></td>
                                                <td>
                                                    <span class="badge bg-info" th:text="${matchInfo.currentSets + '局'}"></span>
                                                </td>
                                                <td>
                                                    <span th:if="${matchInfo.match.status == 0}" class="badge bg-secondary">未开始</span>
                                                    <span th:if="${matchInfo.match.status == 1}" class="badge bg-primary">进行中</span>
                                                    <span th:if="${matchInfo.match.status == 2}" class="badge bg-success">已结束</span>
                                                    <span th:if="${matchInfo.match.status == 3}" class="badge bg-danger">退赛</span>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <div>
                                    <button type="button" class="btn btn-outline-secondary" 
                                            onclick="if(confirm('确定要重置表单吗？')) document.getElementById('batchSetForm').reset();">
                                        <i class="bi bi-arrow-clockwise"></i> 重置
                                    </button>
                                </div>
                                <div>
                                    <button type="submit" class="btn btn-primary" 
                                            onclick="return confirm('确定要批量设置比赛局数吗？现有比分数据将被清除。')">
                                        <i class="bi bi-gear"></i> 批量设置局数
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleAllMatches() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.match-checkbox');
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
            });
        }
        
        // 更新全选状态
        document.querySelectorAll('.match-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const allCheckboxes = document.querySelectorAll('.match-checkbox');
                const checkedCheckboxes = document.querySelectorAll('.match-checkbox:checked');
                const selectAll = document.getElementById('selectAll');
                
                if (checkedCheckboxes.length === 0) {
                    selectAll.checked = false;
                    selectAll.indeterminate = false;
                } else if (checkedCheckboxes.length === allCheckboxes.length) {
                    selectAll.checked = true;
                    selectAll.indeterminate = false;
                } else {
                    selectAll.checked = false;
                    selectAll.indeterminate = true;
                }
            });
        });
        
        // 初始化全选状态
        document.addEventListener('DOMContentLoaded', function() {
            const allCheckboxes = document.querySelectorAll('.match-checkbox');
            const checkedCheckboxes = document.querySelectorAll('.match-checkbox:checked');
            const selectAll = document.getElementById('selectAll');
            
            if (checkedCheckboxes.length === allCheckboxes.length) {
                selectAll.checked = true;
                selectAll.indeterminate = false;
            } else if (checkedCheckboxes.length > 0) {
                selectAll.checked = false;
                selectAll.indeterminate = true;
            }
        });
    </script>
</body>
</html>
