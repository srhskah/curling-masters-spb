<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比赛管理 - Curling Masters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml"
          href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2770%25%27%20font-size%3D%2772%27%20text-anchor%3D%27middle%27%3E%F0%9F%A5%8C%3C/text%3E%3C/svg%3E">
    <link rel="shortcut icon"
          href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2770%25%27%20font-size%3D%2772%27%20text-anchor%3D%27middle%27%3E%F0%9F%A5%8C%3C/text%3E%3C/svg%3E">
    <link th:href="@{/css/main.css?v=1.1}" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand img { height: 40px; }
        .container-main { padding-top: 2rem; padding-bottom: 2rem; }
        .card-glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .match-card {
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }
        .match-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }
        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .status-0 { background: #ffc107; color: #000; }
        .status-1 { background: #17a2b8; color: #fff; }
        .status-2 { background: #28a745; color: #fff; }
        .status-3 { background: #dc3545; color: #fff; }
    </style>
</head>
<body th:classappend="${ipBgClass}">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/images/Logo Trsp Stripe.png" alt="Curling Masters Logo">
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link" href="/season/list">赛季管理</a>
                <a class="nav-link" href="/tournamentLevel/list">赛事等级</a>
                <a class="nav-link" href="/series/list">系列赛事</a>
                <a class="nav-link active" href="/tournament/list">赛事管理</a>
            </div>
        </div>
    </nav>

    <div class="container container-main">
        <div class="card-glass p-4 mb-4">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="mb-0"><i class="bi bi-controller"></i> 比赛管理</h1>
                    <p class="text-muted mb-0 mt-2">管理单场比赛</p>
                </div>
                <div class="col-md-4 text-md-end" th:if="${isAdmin or currentUser != null and tournamentId != null}">
                    <a th:href="@{/match/add(tournamentId=${tournamentId})}" class="btn btn-primary btn-lg">
                        <i class="bi bi-plus-circle"></i> 新增比赛
                    </a>
                </div>
            </div>
        </div>

        <!-- 修复：使用matchInfoList而不是matches -->
        <div th:if="${matchInfoList != null and !matchInfoList.isEmpty()}">
            <div class="row">
                <div class="col-12" th:each="matchInfo : ${matchInfoList}">
                    <div class="card-glass p-4 match-card">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <h5 class="mb-1">
                                    <span th:text="${matchInfo.player1Name}">选手1</span> vs 
                                    <span th:text="${matchInfo.player2Name}">选手2</span>
                                </h5>
                                <p class="text-muted mb-0">
                                    <i class="bi bi-tag"></i> 
                                    <span th:text="${matchInfo.match.category}">类别</span>
                                    <span class="status-badge ms-2" 
                                          th:classappend="${'status-' + matchInfo.match.status}"
                                          th:text="${matchInfo.match.status == 0 ? '未开始' : (matchInfo.match.status == 1 ? '进行中' : (matchInfo.match.status == 2 ? '已结束' : '退赛'))}">
                                        状态
                                    </span>
                                </p>
                                <p class="text-muted mb-0" th:if="${matchInfo.match.scheduledTime}">
                                    <i class="bi bi-clock"></i> 计划时间：<span th:text="${#temporals.format(matchInfo.match.scheduledTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                                </p>
                            </div>
                            <div class="col-md-4 text-md-end mt-3 mt-md-0">
                                <a th:href="@{/match/score/{id}(id=${matchInfo.match.id})}" class="btn btn-outline-info">
                                    <i class="bi bi-pencil-square"></i> 录入比分
                                </a>
                                <span th:if="${isAdmin or matchInfo.isHost}">
                                    <a th:href="@{/match/edit/{id}(id=${matchInfo.match.id}, tournamentId=${tournamentId})}" class="btn btn-outline-primary">
                                        <i class="bi bi-pencil"></i> 编辑
                                    </a>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center text-white" th:if="${matchInfoList == null or matchInfoList.isEmpty()}">
            <i class="bi bi-inbox" style="font-size: 4rem;"></i>
            <h4>暂无比赛</h4>
            <p th:if="${isAdmin or currentUser != null and tournamentId != null}">点击上方按钮创建比赛</p>
        </div>
    </div>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 Curling Masters. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
