<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head('登录')}">
</head>

<body th:classappend="${ipBgClass}">
    <!-- 登录导航栏 -->
    <div th:replace="~{fragments :: navbar-login}"></div>

    <div class="container">
        <div class="login-container">
            <h2 class="text-center mb-4">登录 Curling Masters</h2>

            <!-- 显示错误消息 -->
            <div th:replace="~{fragments :: error-alert}"></div>

            <!-- 显示成功消息 -->
            <div th:replace="~{fragments :: success-alert}"></div>

            <form th:action="@{/login}" method="post" id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" name="username" 
                           th:value="${rememberedUsername}" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                
                <!-- 记住我选项 -->
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe" 
                           th:checked="${rememberMe}">
                    <label class="form-check-label" for="rememberMe">
                        记住我的用户名
                    </label>
                </div>

                <!-- 用户偏好设置 -->
                <div class="mb-3">
                    <label for="theme" class="form-label">主题偏好</label>
                    <select class="form-select" id="theme" name="theme">
                        <option value="">默认</option>
                        <option value="light" th:selected="${userTheme == 'light'}">浅色主题</option>
                        <option value="dark" th:selected="${userTheme == 'dark'}">深色主题</option>
                        <option value="auto" th:selected="${userTheme == 'auto'}">跟随系统</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="language" class="form-label">语言偏好</label>
                    <select class="form-select" id="language" name="language">
                        <option value="">默认</option>
                        <option value="zh-CN" th:selected="${userLanguage == 'zh-CN'}">简体中文</option>
                        <option value="zh-TW" th:selected="${userLanguage == 'zh-TW'}">繁体中文</option>
                        <option value="en" th:selected="${userLanguage == 'en'}">English</option>
                    </select>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">登录</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <p>还没有账号？<a href="/user/register">立即注册</a></p>
            </div>

            <!-- Cookie信息显示 -->
            <div class="mt-4 p-3 bg-light rounded">
                <h6>Cookie 信息</h6>
                <small class="text-muted">
                    <div th:if="${rememberedUsername}">
                        已记住用户名: <span th:text="${rememberedUsername}"></span>
                    </div>
                    <div th:if="${userTheme}">
                        当前主题: <span th:text="${userTheme}"></span>
                    </div>
                    <div th:if="${userLanguage}">
                        当前语言: <span th:text="${userLanguage}"></span>
                    </div>
                    <div th:unless="${rememberedUsername}">
                        暂无保存的用户信息
                    </div>
                </small>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <div th:replace="~{fragments :: footer}"></div>

    <!-- 脚本 -->
    <th:block th:replace="~{fragments :: scripts}"></th:block>
    
    <script>
        // 登录成功后保存偏好设置
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            // 这里可以添加客户端验证
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                e.preventDefault();
                alert('请输入用户名和密码');
                return false;
            }
            
            // 显示加载状态
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 登录中...';
            submitBtn.disabled = true;
            
            // 如果超时，恢复按钮状态
            setTimeout(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }, 10000);
        });

        // 清除Cookie功能
        function clearCookies() {
            if (confirm('确定要清除所有保存的偏好设置吗？')) {
                document.cookie.split(";").forEach(function(c) {
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
                });
                location.reload();
            }
        }

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 如果有记住的用户名，聚焦到密码输入框
            const username = document.getElementById('username').value;
            if (username) {
                document.getElementById('password').focus();
            } else {
                document.getElementById('username').focus();
            }
        });
    </script>
</body>
</html>
